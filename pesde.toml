name = "bizwiz3/aura"
version = "0.1.0"
description = "The HTTP client for Lune. Aura is a lightweight wrapper around Lune's native net library for handling request. Inspired by Axios, it simplifies data fetching by handling JSON encoding/decoding, URL normalization, and standardized response objects automatically."
license = "MIT"
authors = ["BizWiz3"]
repository = "https://github.com/BizWiz3/aura"
private = false

includes = ["LICENSE", "README.md", "src/index.luau", "pesde.toml"]

[target]
environment = "lune"
lib = "src/index.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dependencies]
